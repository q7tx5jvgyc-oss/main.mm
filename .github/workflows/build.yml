name: Build iOS Dylib Fast

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Compile Moustache Dylib
        run: |
          clang++ -dynamiclib -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 -arch arm64e \
          -framework UIKit -framework CoreGraphics -framework QuartzCore \
          main.mm -o AutoClicker.dylib

      - name: Upload Moustache Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-Moustache-Package
          path: ./AutoClicker.dylib
