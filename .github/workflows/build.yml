name: Build iOS Dylib with Theos

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Theos Dependencies
        run: |
          brew install ldid xz
          
      - name: Set up Theos Environment
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Download iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks
          
      - name: Build with Theos
        run: |
          export THEOS=$HOME/theos
          make package FINALPACKAGE=1
          
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-Dylib
          path: .theos/obj/debug/*.dylib
